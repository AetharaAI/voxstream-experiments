services:
  voxtream-provider:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VOXTREAM_PACKAGE_SPEC: voxtream==0.1.5
    runtime: nvidia
    env_file: .env
    environment:
      VOXTREAM_PROVIDER_FAMILY: voxtream
      VOXTREAM_PROVIDER_PORT: 8074
      VOXTREAM_PROVIDER_PUBLIC_BASE_URL: http://voxtream-provider:8074
      VOXTREAM_MODEL_ALIAS: voxtream_realtime
      VOXTREAM_MODEL_ID: herimor/voxtream
      VOXTREAM_MODEL_PATH: /models/voice/herimor/voxtream
      VOXTREAM_GENERATOR_CONFIG_PATH: configs/voxtream.generator.json
      VOXTREAM_SPEAKING_RATE_CONFIG_PATH: configs/voxtream2.speaking_rate.json
      NVIDIA_VISIBLE_DEVICES: ${VOXTREAM_PROVIDER_GPU_IDS:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "127.0.0.1:8074:8074"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:/models:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}
    networks:
      default:
        aliases:
          - voxtream-provider

  voxtream2-provider:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VOXTREAM_PACKAGE_SPEC: voxtream>=0.2,<0.3
    runtime: nvidia
    env_file: .env
    environment:
      VOXTREAM_PROVIDER_FAMILY: voxtream2
      VOXTREAM_PROVIDER_PORT: 8075
      VOXTREAM_PROVIDER_PUBLIC_BASE_URL: http://voxtream2-provider:8075
      VOXTREAM_MODEL_ALIAS: voxtream2_realtime
      VOXTREAM_MODEL_ID: herimor/voxtream2
      VOXTREAM_MODEL_PATH: /models/voice/herimor/voxtream2
      VOXTREAM_GENERATOR_CONFIG_PATH: configs/voxtream2.generator.json
      VOXTREAM_SPEAKING_RATE_CONFIG_PATH: configs/voxtream2.speaking_rate.json
      NVIDIA_VISIBLE_DEVICES: ${VOXTREAM_PROVIDER_GPU_IDS:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "127.0.0.1:8075:8075"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:/models:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}
    networks:
      default:
        aliases:
          - voxtream2-provider

networks:
  default:
    external: true
    name: ${VOXTREAM_PROVIDER_NETWORK_NAME:-aether-voice-mesh}
